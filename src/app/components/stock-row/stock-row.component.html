<tr>
  <td class="ticker font-mono">{{ stock.ticker }}</td>
  <td class="empresa">{{ stock.empresa }}</td>
  <td class="data font-mono">{{ stock.dataCompra }}</td>
  <td class="numero font-mono">{{ stock.quantidade }}</td>
  <td class="numero font-mono">{{ formatarMoeda(stock.precoCompra) }}</td>
  <!-- Coluna Calculada: Total (Azul) -->
  <td class="numero font-mono total-col">{{ formatarMoeda(stock.total) }}</td>
  <td class="numero font-mono">{{ formatarMoeda(stock.cotacaoDia) }}</td>
  <!-- Coluna Calculada: Valor (Verde) -->
  <td class="numero font-mono valor-col">{{ formatarMoeda(stock.valor) }}</td>
  <td class="numero variacao-wrapper">
    <span class="variacao-badge" [ngClass]="getVariacaoClass()">
      {{ formatarVariacao(stock.variacao) }}%
    </span>
  </td>
  <td class="sparkline-wrapper">
    <svg class="sparkline-svg" width="70" height="24" [ngClass]="getVariacaoClass()">
      <polyline
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        [attr.points]="getSparklinePoints()">
      </polyline>
    </svg>
  </td>
  <td class="actions-col">
    <button class="btn-delete" (click)="remover()" title="Remover posição">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="delete-icon"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>
    </button>
  </td>
</tr>

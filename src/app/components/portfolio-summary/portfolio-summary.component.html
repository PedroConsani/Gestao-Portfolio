<tr class="total-row">
  <td colspan="5" class="label">TOTAL</td>
  <!-- Coluna 6: Total Aquisição (Azul) -->
  <td class="numero total-col font-mono">{{ formatarMoeda(totalAquisicao) }}</td>
  <!-- Coluna 7: Vazia (Cotação do Dia) -->
  <td></td>
  <!-- Coluna 8: Valor Total (Verde) -->
  <td class="numero valor-col font-mono">{{ formatarMoeda(totalValor) }}</td>
  <!-- Coluna 9: Variação Total (%) (Vermelho / Verde / Preto) -->
  <td class="variacao-wrapper" style="text-align: center;">
    <span class="variacao-badge" [ngClass]="getVariacaoClass()">
      {{ formatarVariacao(variacaoTotal) }}%
    </span>
  </td>
  <!-- Coluna 10: Vazia (Tendência) -->
  <td style="text-align: center;"></td>
  <!-- Coluna 11: Vazia (Ações) -->
  <td></td>
</tr>
